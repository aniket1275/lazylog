name: Lint

on:
  pull_request:
  push:

jobs:

  rust:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo fmt --check

      - run: cargo clippy -- -D warnings

  python:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

      - run: pip install black ruff

      - run: black --check .

      - run: ruff check .